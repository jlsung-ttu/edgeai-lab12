# Lab 12 CI workflow — runs on every push and PR to any branch.
# Three jobs:
#   1. lint   — ruff check (style + import order + obvious bugs)
#   2. test   — pytest on the smoke tests in tests/
#   3. build  — multi-arch ARM64 docker build + push to GHCR (gated on lint+test)
# lint and test run on the free GitHub-hosted ubuntu-latest x86 runner;
# build also runs there but uses QEMU to emulate aarch64.

name: CI

on:
  push:
    branches: ["**"]   # any branch
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Run ruff
        # --output-format=github makes errors show up as inline annotations
        # on the PR diff, not just in the log.
        run: ruff check . --output-format=github

  test:
    name: Pytest smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install test deps
        # We deliberately don't pip-install requirements.txt here — most of
        # those packages need a Jetson + CUDA wheel that doesn't exist on
        # x86. The smoke tests only need pytest itself.
        run: pip install pytest==8.3.3

      - name: Run pytest
        run: pytest tests/ -v

  build:
    name: Build & push ARM64 image
    runs-on: ubuntu-latest
    needs: [lint, test]    # only build if lint + test pass
    permissions:
      contents: read
      packages: write       # required for ghcr.io push
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        # Lets the x86 runner execute aarch64 binaries inside the build.
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # GITHUB_TOKEN is auto-provided by the workflow runner; it's
        # scoped to this repo and is what the `packages: write` grant
        # above unlocks.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        # Tag every push with the short SHA, and additionally tag pushes
        # to main with :latest. PR builds get only :pr-<number>.
        # Note: `images:` is just `${{ github.repository }}` (which is
        # already `<user>/<repo>`) — adding `/edgeai-lab12` would
        # path-double to `<user>/edgeai-lab12/edgeai-lab12`.
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Speed up subsequent builds by caching layers in GHA's cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
  jetson-smoke:
    name: Smoke test on Jetson
    runs-on: [self-hosted, linux, arm64, jetson]
    needs: build
    steps:
      - uses: actions/checkout@v5
      - name: Pull and verify image on this Jetson
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE="ghcr.io/${{ github.repository }}:sha-${SHORT_SHA}"
          echo "Pulling $IMAGE"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull "$IMAGE"
          docker volume create lab12-models
          # Override the CMD with a quick engine-load check.
          # The entrypoint still runs first (compiles engine if cache miss),
          # then exec's our python3 -c command.
          docker run --rm --runtime nvidia -v lab12-models:/opt/models \
            "$IMAGE" python3 -c "
          from ultralytics import YOLO
          m = YOLO('/opt/models/best.engine', task='detect')
          print('PASS: engine loads on Jetson hardware')
          "

